<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catland Scoreboard</title>
    <style>
        body{
    background-image: url(Cats-arriving.jpeg);
    animation: ease 10s normal bgchange infinite;
    background-size: cover;
}
*{
    transition: ease 2s;
}
@font-face {
    font-family: "fancyfont";
    src: url(font01.woff);
}
center,.center{
  text-align: center;
}

@keyframes bgchange{
    0%, 100%{
        background-image: url(Cats-arriving.jpeg);
    }
    33%{
        background-image: url(Leading-Platform.jpeg);
    }
    50%{
        background-image: url(hotels.svg);
    }
    66%{
        background-image: url(Leading-Platform.jpeg);
    }
}
@keyframes darkmodebg{
    0%, 100%{
        background-image: url(Hotel-night.jpeg);
    }
    50%{
        background-image: url(IMG_7103.jpeg);
    }
}
@keyframes pulse{
    0%,100%{
        scale: 1;
        background-color: green;
        color:white;
    }
    50%{
        scale: 1.5;
        background-color: #800080;
        color:black;
    }
}
#game-name{
    h1{
        font-family: cursive;
    }
    h2{
        font-family: fancyfont, Georgia, 'Times New Roman', Times, serif;
    }
}
#bar{
    background-color: gray;
    height: 20px;
    width:70%;
    border-radius: 10px;
    display: flex;
    text-align: center;
    unicode-bidi: isolate;
    @starting-style{
        width:0;
    }
}
#bar #play1{
    border-radius: 10px;
    display:block;
    width:0%;
    background-color: yellow;
    z-index: 1000;
    height: 20px;
    
}
#bar #play2{
    border-radius: 10px;
    display:block;
    width:0%;
    background-color: blue;
    z-index: 1000;
    height: 20px;
    
}
button{
    background-color:blue;
    color: white;
    transition:ease 0.5s;
}
button:hover{
    scale:1.5;
}
button:disabled{
    opacity:0;
    scale:2;
}
#pwrupdate{
    opacity:1;
    visibility:visible;
}
dialog[open]+#pwrupdate{
    opacity:0;
    visibility:hidden;
}
dialog{
    transition:ease-out 0.5s;
}
dialog:not(open){
    opacity:0;
    display:block;
    position:absolute;
    top:0;
}
dialog[open]{
    opacity:1;
}
#player1, #player2{
    background-color: white;
    button:enabled{
        background-color:blue;
        animation: ease-in-out pulse 1s infinite;
    }
    button:disabled{
        animation:none;
    }
}
#player1{
    float: left;
}
#player2{
    float:right;
}
#barP1,#barP2{
    height:20px;
    background-color:gray;
    border-radius:10px;
    overflow-x:hidden;
    .marker{
        width:10px;
        background-color:black;
        z-index:10000;
        height:20px;
        position:relative;
    }
}
/* ******Dark Mode CSS****** */
@media (prefers-color-scheme: dark) {

    body{
        color:white;
        background-image:url(Hotel-night.jpeg);
        animation: ease 10s normal darkmodebg infinite;
    }
    #player1, #player2{
        background-color: black;
        button:disabled{
        color: black;
    }

    }
}
    </style>
</head>
<body>
    <center id="game-name">
        <h1>Catland</h1>
        <h2>Card Kitties</h2>
        <h2>Scoreboard</h2>
    </center>
    <div id="player1">
        <h3>Player 1</h3>
        <h3>Rounds Won</h3>
        <h1><button onclick="players[0].won--" id="wonp1-">-</button><span id="wonP1">0</span><button onclick="players[0].won++" id="wonp1+">+</button></h1>
        <h3>Bonus/Penalty Points</h3>
        <h1><button onclick="players[0].bORp--">-</button><span id="b/pP1">0</span><button onclick="players[0].bORp++">+</button></h1>
        <div id="barP1"><div class="marker"></div></div>
    </div>
    <div id="player2">
        <h3>Player 2</h3>
        <h3>Rounds Won</h3>
        <h1><button onclick="players[1].won--" id="wonp2-">-</button><span id="wonP2">0</span><button onclick="players[1].won++" id="wonp2+">+</button></h1>
        <h3>Bonus/Penalty Points</h3>
        <h1><button onclick="players[1].bORp--">-</button><span id="b/pP2">0</span><button onclick="players[1].bORp++">+</button></h1>
        <div id="barP2"><div class="marker"></div></div>
    </div>
    <center>
        <br>
    <h3>Visual Representation</h3>
    <div id="bar">
        <span id="play1"></span>
        <span id="play2"></span>
    </div>
    <br>
    <h3>Power Cards Played</h3>
    <div id="power">None</div>
    <dialog id="powerOptions">
        <h3>Update Powers</h3>
        <div id="addhere"></div>
        <button onclick="currentPowers = [];">Clear Powers</button>
        <button onclick="getEl('powerOptions').open = false;">Done</button>
    </dialog>
    <button onclick="getEl('powerOptions').open = true;" id=pwrupdate>Update</button>
    </center>
    <script>
        var players = [
            {
                /**
                 * @typedef Player an object representing a person playing the game
                 * @property {Number} won The number of rounds the player has won
                 * @property {Number} bORp Bonus or Penalty points from the previous round
                 */
                won:0,
                bORp:0
            },
            {
                won:0,
                bORp:0
            }
        ];
        var powerOptions = [
            "Swapping Cat",
            "Hana for P1",
            "Hana for P2",
            "Wizard Cat"
        ]
        powerOptions.forEach(element => {
                    let div = document.createElement('div');
                    div.innerHTML = `<button onclick="currentPowers.push('${element}')">Add</button> ${element}`;
                    getEl('addhere').appendChild(div);
                });
        var currentPowers = [];
        function getEl(id="") {
            return document.getElementById(id);
        }
        // Updater
        setInterval(() => {
            getEl("wonp1-").disabled = false;
            getEl("wonp1+").disabled = false;
            getEl("wonp2-").disabled = false;
            getEl("wonp2+").disabled = false;
            if (players[0].won <= 0){
                players[0].won = 0;
                getEl("wonp1-").disabled = true;
            }else if (players[0].won >= 9){
                players[0].won = 9;
                getEl("wonp1+").disabled = true;
            }
            if (players[1].won <= 0){
                players[1].won = 0;
                getEl("wonp2-").disabled = true;
            }else if (players[1].won >= 9){
                players[1].won = 9;
                getEl("wonp2+").disabled = true;
            }
            getEl('wonP1').innerHTML = players[0].won;
            getEl('wonP2').innerHTML = players[1].won;
            getEl('b/pP1').innerHTML = players[0].bORp;
            getEl('b/pP2').innerHTML = players[1].bORp;
            getEl('play1').style.width = `${ (players[0].won / 9) * 100}%`;
            getEl('play2').style.width = `${ (players[1].won / 9) * 100}%`;
            getEl('power').innerHTML = (currentPowers.length == 0)? "None" : currentPowers.join("<br>");
            getEl('barP1').children[0].style.left = `${10 * (players[0].bORp + 4.75)}%`;
            getEl('barP2').children[0].style.left = `${10 * (players[1].bORp + 4.75)}%`;
        }, 100);
    </script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/Catland-Card-Kitties/sw.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed', err));
        });
    }
</script>
</body>
</html>
